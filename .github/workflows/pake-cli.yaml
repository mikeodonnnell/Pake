name: Build App With Pake CLI

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: true
        default: "windows-latest"
        type: choice
        options:
          - "windows-latest"
          - "macos-latest"
          - "ubuntu-24.04"
      url:
        description: "Website URL"
        required: true
      name:
        description: "App name (lowercase for Linux)"
        required: true
      icon:
        description: "Icon URL, auto-fetch if empty"
        required: false
      width:
        description: "Window width (px)"
        required: false
        default: "1280"
      height:
        description: "Window height (px)"
        required: false
        default: "1030"
      min_width:
        description: "Minimum window width (px)"
        required: false
      min_height:
        description: "Minimum window height (px)"
        required: false
      app_version:
        description: "App version"
        required: false
        default: "1.0.0"
      multi_instance:
        description: "Allow multiple instances of the app to run simultaneously"
        required: false
        type: boolean
        default: true
      multi_window:
        description: "Allow multiple windows"
        required: false
        type: boolean
        default: false
      fullscreen:
        description: "Start in fullscreen mode"
        required: false
        type: boolean
        default: false
      hide_title_bar:
        description: "Hide title bar (macOS only)"
        required: false
        type: boolean
        default: false
      multi_arch:
        description: "Universal binary (macOS only)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Package formats (comma-separated: deb,appimage,rpm,zst)"
        required: false
        default: "deb"

jobs:
  build:
    name: ${{ inputs.platform }}
    runs-on: ${{ inputs.platform }}
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup mold linker
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      - name: Rust cache restore
        uses: actions/cache/restore@v4.2.0
        id: cache_store
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}

      - name: Build App (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 25
        shell: bash
        run: |
          ARGS=("${{ inputs.url }}" "--name" "${{ inputs.name }}")

          if [ -n "${{ inputs.icon }}" ]; then
            ARGS+=("--icon" "${{ inputs.icon }}")
          fi

          if [ -n "${{ inputs.width }}" ]; then
            ARGS+=("--width" "${{ inputs.width }}")
          fi

          if [ -n "${{ inputs.height }}" ]; then
            ARGS+=("--height" "${{ inputs.height }}")
          fi

          if [ -n "${{ inputs.min_width }}" ]; then
            ARGS+=("--min-width" "${{ inputs.min_width }}")
          fi

          if [ -n "${{ inputs.min_height }}" ]; then
            ARGS+=("--min-height" "${{ inputs.min_height }}")
          fi

          if [ -n "${{ inputs.app_version }}" ]; then
            ARGS+=("--app-version" "${{ inputs.app_version }}")
          fi

          if [ "${{ inputs.fullscreen }}" == "true" ]; then
            ARGS+=("--fullscreen")
          fi

          if [ "${{ inputs.hide_title_bar }}" == "true" ]; then
            ARGS+=("--hide-title-bar")
          fi

          if [ "${{ inputs.multi_arch }}" == "true" ]; then
            ARGS+=("--multi-arch")
          fi

          if [ -n "${{ inputs.targets }}" ] && [ "${{ runner.os }}" == "Linux" ]; then
            ARGS+=("--targets" "${{ inputs.targets }}")
          fi

          echo "Running: node dist/cli.js ${ARGS[@]}"
          node dist/cli.js "${ARGS[@]}"

      - name: Build App (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 25
        shell: pwsh
        run: |
          $args = "${{ inputs.url }}", "--name", "${{ inputs.name }}"

          if ("${{ inputs.icon }}" -ne "") {
            $args += "--icon", "${{ inputs.icon }}"
          }

          if ("${{ inputs.width }}" -ne "") {
            $args += "--width", "${{ inputs.width }}"
          }

          if ("${{ inputs.height }}" -ne "") {
            $args += "--height", "${{ inputs.height }}"
          }

          if ("${{ inputs.min_width }}" -ne "") {
            $args += "--min-width", "${{ inputs.min_width }}"
          }

          if ("${{ inputs.min_height }}" -ne "") {
            $args += "--min-height", "${{ inputs.min_height }}"
          }

          if ("${{ inputs.app_version }}" -ne "") {
            $args += "--app-version", "${{ inputs.app_version }}"
          }

          if ("${{ inputs.fullscreen }}" -eq "true") {
            $args += "--fullscreen"
          }

          if ("${{ inputs.hide_title_bar }}" -eq "true") {
            $args += "--hide-title-bar"
          }

          if ("${{ inputs.multi_instance }}" -eq "true") {
            $args += "--multi-instance"
          }

          if ("${{ inputs.multi_window }}" -eq "true") {
            $args += "--multi-window"
          }

          # Create the javascript file with BOTH border toggle and zoom controllers
          $jsContent = @"
          let zoomLevel = 1.0;
          
          document.addEventListener('keydown', async (e) => {
            // === 1. BORDERLESS TOGGLE (F11 Override) ===
            if (e.key === 'F11') {
              e.preventDefault();
              try {
                // Pinpoint the window object explicitly bypassing version mismatching
                const appWindow = window.__TAURI__.window.getCurrentWindow 
                  ? window.__TAURI__.window.getCurrentWindow() 
                  : (window.__TAURI__.window.getCurrent ? window.__TAURI__.window.getCurrent() : window.__TAURI__.window.appWindow);

                // Check Tauri's real decoration state dynamically
                const hasDecorations = await appWindow.isDecorated();
                
                // Toggle the borders cleanly: if it has them, remove them. If not, restore them.
                await appWindow.setDecorations(!hasDecorations);
              } catch (err) {
                console.error('Tauri interaction failed:', err);
              }
            }
          
            // === 2. ZOOM IN (Ctrl + '=') ===
            if (e.ctrlKey && e.key === '=') {
              e.preventDefault();
              zoomLevel += 0.1;
              document.body.style.transform = 'scale(' + zoomLevel + ')';
              document.body.style.transformOrigin = 'top left';
              document.body.style.width = (100 / zoomLevel) + '%';
              document.body.style.height = (100 / zoomLevel) + '%';
            }
          
            // === 3. ZOOM OUT (Ctrl + '-') ===
            if (e.ctrlKey && e.key === '-') {
              e.preventDefault();
              zoomLevel = Math.max(0.5, zoomLevel - 0.1); // Limits minimum shrinkage to 50%
              document.body.style.transform = 'scale(' + zoomLevel + ')';
              document.body.style.transformOrigin = 'top left';
              document.body.style.width = (100 / zoomLevel) + '%';
              document.body.style.height = (100 / zoomLevel) + '%';
            }
          
            // === 4. RESET ZOOM (Ctrl + '0') ===
            if (e.ctrlKey && e.key === '0') {
              e.preventDefault();
              zoomLevel = 1.0;
              document.body.style.transform = 'none';
              document.body.style.width = '100%';
              document.body.style.height = '100%';
            }
          });
          "@
          
          # Write the text block cleanly to your workspace
          Set-Content -Path "toggle-border.js" -Value $jsContent

          $args += "--inject"
          $args += "./toggle-border.js"

          Write-Host "Running: node dist/cli.js $($args -join ' ')"
          node dist/cli.js @args

          git checkout -- src-tauri/Cargo.lock

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-macOS
          path: ${{ inputs.name }}.dmg
          retention-days: 3

      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-deb
          path: ${{ inputs.name }}.deb
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-AppImage
          path: ${{ inputs.name }}.AppImage
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload RPM (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-rpm
          path: ${{ inputs.name }}.rpm
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload ZST (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-zst
          path: ${{ inputs.name }}-*.pkg.tar.zst
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Windows
          path: ${{ inputs.name }}.msi
          retention-days: 3

      - name: Rust cache store
        uses: actions/cache/save@v4.2.0
        if: steps.cache_store.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}
